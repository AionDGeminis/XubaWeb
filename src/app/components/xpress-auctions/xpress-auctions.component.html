
<div class="mt-3">
  <h2 class="" style="text-align: center; color: #616160; font-family: Gobold;font-size: 20px;" >
    Xubastas EXPRESS
  </h2></div>
  <div class="barra-subastas">
    <!-- Flecha izquierda -->
    <div class="flecha-izquierda d-flex d-sm-none" [ngClass]="{'disabled-a': !mostrarFlechaIzquierda}" (click)="scrollIzquierda(contenedorRef.nativeElement)">
      <i class="fas fa-chevron-left"></i>
    </div>
    <div class="flecha-izquierda d-none d-sm-flex" *ngIf="mostrarFlechaIzquierda" (click)="scrollIzquierda(contenedorRef.nativeElement)">
      <i class="fas fa-chevron-left"></i>
    </div>
  
    <!-- Contenedor de subastas -->
    <div class="contenedor-items pt-2"  #contenedor (scroll)="verificarScroll(contenedorRef.nativeElement)">
      <ng-container *ngFor="let subasta of xpress" >
  
        <div class="subasta-item pt-3"  style="position: relative;"
        
        [ngClass]="{ 'fade-out': subasta.vencida , 's-premium':subasta.premium, 's-gen':!subasta.premium}" 
        (click)="abrirModal(subasta)" >
         <i *ngIf="subasta.premium" style="position: absolute;left:28px; top:-2px;color: #d1a037;font-size:1.3em;" class="fas fa-gem"></i>

          <img [src]="subasta.url" alt="Producto" />
          <div class="hora">{{ subasta.tiempoVence }}</div>
          <div class="apuesta">{{ toCurrency(subasta.apuesta) }}</div>
        </div>
     
      </ng-container>
    
    </div>

    <!-- <div class="stories-wrapper"  >
      <button class="nav-btn left" (click)="scrollIzquierda(contenedorRef.nativeElement)">‹</button>
    
      <div class="stories-container pt-5"  #contenedor id="stories">
        <div class="story-item" style="position: relative;;" *ngFor="let subasta of xpress">
          <i *ngIf="subasta.premium" style="position: absolute;left:30px; top:-15px;color: #d1a037;font-size:1.3em;" class="fas fa-gem"></i>

          <div class="story-circle">
            <img [src]="subasta.url" />
          </div>

        </div>
      </div>
    
      <button class="nav-btn right" (click)="scrollDerecha(contenedorRef.nativeElement)">›</button>
    </div>
     -->
    <!-- Flecha derecha -->
    <div class="flecha-derecha d-flex d-sm-none" [ngClass]="{'disabled-a': !mostrarFlechaDerecha}" (click)="scrollDerecha(contenedorRef.nativeElement)" >
      <i class="fas fa-chevron-right"></i>
    </div>
    <div class="flecha-derecha d-none d-sm-flex" *ngIf="mostrarFlechaDerecha" (click)="scrollDerecha(contenedorRef.nativeElement)" >
      <i class="fas fa-chevron-right"></i>
    </div>
  </div>
