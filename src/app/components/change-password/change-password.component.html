<app-loader *ngIf="loading"></app-loader>

<div *ngIf="!showFormChangePassword" class="change-password-container">
    <div class="change-password-card">
  
      <div class="card-header">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h3>Cambiar contraseña</h3>
        <p>Validando informacion</p>
      </div>
  
      <div class="card-body">
       
        <img *ngIf="loading && !invalid" class="main-ico" src="images/validatedata.png" alt="">
        <img *ngIf="!loading && invalid" class="main-ico" src="images/invalid.png" alt="">
        <p class="error-message">
            El enlace ha expirado o la informacion enviada es invalida.
        </p>
        <button  *ngIf="!loading && invalid" class="btn-change-password">
          Volver a Xuba
        </button>
      </div>
  
    </div>
  </div>
<div *ngIf="showFormChangePassword" class="change-password-container">
    <div class="change-password-card">
  
      <div class="card-header">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h3>Cambiar contraseña</h3>
        <p>Ingresa tu nueva contraseña para continuar</p>
      </div>
  
      <div class="card-body">
        <div class="input-group">
          <label for="nueva-password">Nueva contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="nueva-password" [(ngModel)]="pass.new" placeholder="••••••••" />
            <span class="toggle-eye">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </span>
          </div>
        </div>
  
        <div class="input-group">
          <label for="confirmar-password">Confirmar contraseña</label>
          <div class="input-wrapper">
            <input type="password" [(ngModel)]="pass.repeat"  id="confirmar-password" placeholder="••••••••" />
            <span class="toggle-eye">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </span>
          </div>
        </div>
  
        <button class="btn-change-password" (click)="changePasswordUser()">
          Actualizar contraseña
        </button>
      </div>
  
    </div>
  </div>
